server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;

        # Security headers (audit F-F2). object-src/base-uri/frame-ancestors are locked down
        # (real XSS/clickjacking sinks, zero app-breakage); script/style/font/connect are
        # allowlisted to current usage. Follow-ups still open: tighten script-src off
        # 'unsafe-inline' to nonces/hashes (blocked on the inline importmap), self-host the
        # Google Fonts, and move the JWT into an HttpOnly cookie.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    }

    # Proxy API requests to controller
    location /api/ {
        proxy_pass http://controller:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE requires special proxy settings
    location /api/v1/events/stream {
        proxy_pass http://controller:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # Prometheus metrics proxy
    location /metrics {
        proxy_pass http://controller:8080;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
