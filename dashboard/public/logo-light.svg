<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 224 48" role="img" aria-label="PrexorCloud">
  <title>PrexorCloud</title>
  <!-- Voxel-cloud mark on cyan plate. -->
  <g transform="translate(0,8)">
    <rect width="32" height="32" rx="7" ry="7" fill="#06b6d4"/>
    <g fill="#ffffff" shape-rendering="crispEdges">
      <rect x="12" y="8"  width="4" height="4"/><rect x="16" y="8"  width="4" height="4"/>
      <rect x="8"  y="12" width="4" height="4"/><rect x="12" y="12" width="4" height="4"/>
      <rect x="16" y="12" width="4" height="4"/><rect x="20" y="12" width="4" height="4"/>
      <rect x="4"  y="16" width="4" height="4"/><rect x="8"  y="16" width="4" height="4"/>
      <rect x="12" y="16" width="4" height="4"/><rect x="16" y="16" width="4" height="4"/>
      <rect x="20" y="16" width="4" height="4"/><rect x="24" y="16" width="4" height="4"/>
      <rect x="4"  y="20" width="4" height="4"/><rect x="8"  y="20" width="4" height="4"/>
      <rect x="12" y="20" width="4" height="4"/><rect x="16" y="20" width="4" height="4"/>
      <rect x="20" y="20" width="4" height="4"/><rect x="24" y="20" width="4" height="4"/>
    </g>
  </g>
  <!-- Wordmark: light-surface lockup, dark text. -->
  <text
    x="48" y="32"
    font-family="'Inter Tight', 'Inter', system-ui, sans-serif"
    font-size="22"
    font-weight="700"
    letter-spacing="-0.02em"
    fill="#2c3027"
  >PrexorCloud</text>
</svg>
