syntax = "proto3";
package me.prexorjustin.prexorcloud.protocol;

option java_package = "me.prexorjustin.prexorcloud.protocol";
option java_multiple_files = true;
option go_package = "github.com/prexorcloud/prexorctl/proto/prexorcloud";

// Controller-to-controller membership. A joining controller calls RequestJoin
// on any existing controller (which redirects to the leader if needed). The
// service validates the join token's HMAC against the cluster seed secret,
// atomically redeems it via Raft, signs the joiner's CSR with the cluster CA,
// and returns the signed cert + CA cert + cluster id.
//
// The actual Ratis joint-consensus member-add happens once the joiner has its
// new TLS material — it brings up its own Ratis server and calls
// GroupManagementApi.add() on itself; the leader then expands the group via
// setConfiguration. See docs/engineering/cluster-join-plan.md.
service ClusterMembership {
  rpc RequestJoin(RequestJoinRequest) returns (RequestJoinResponse);
}

message RequestJoinRequest {
  // Wire token: "prexor-jt:v1:<base64url(payload)>.<base64url(hmac)>".
  string token = 1;
  // Human-readable label for the joining controller (e.g. "controller-2").
  // The state machine pins this to AddMember.label.
  string node_id = 2;
  // host:port the joiner's Ratis listens on (cluster-internal).
  string raft_addr = 3;
  // host:port the joiner's REST listens on (operator-facing).
  string rest_addr = 4;
  // host:port the joiner's controller gRPC listens on (modules/daemons).
  string grpc_addr = 5;
  // PKCS#10 CSR (DER) — joiner's ephemeral keypair + the SANs it wants on its leaf.
  bytes csr_der = 6;
}

message RequestJoinResponse {
  // X.509 leaf cert signed by the cluster CA. The joiner pairs this with its
  // private key (held locally, never leaves the joining host) to terminate
  // cluster-trusted TLS on its own gRPC + Ratis endpoints.
  bytes signed_cert_der = 1;
  // Cluster CA cert. The joiner trusts this for incoming cluster traffic.
  bytes ca_cert_der = 2;
  // The cluster's stable identifier. The joiner writes it to its controller.yml
  // mirror so a future restart can refuse to bind to a different cluster's data.
  string cluster_id = 3;
}
