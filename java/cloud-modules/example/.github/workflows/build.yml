# Template build + sign workflow for a standalone PrexorCloud module.
#
# This file is part of the `example` module template and is copied into
# every module the scaffolder generates. Inside the prexorcloud monorepo
# this file lives at java/cloud-modules/<name>/.github/workflows/build.yml
# and is INVISIBLE to GitHub Actions — only .github/workflows/ at the repo
# root is picked up. The workflow becomes active when an external
# contributor extracts the module subtree into its own repo (which then
# makes <module>/.github/workflows/build.yml the repo-root workflow).
#
# What it does:
#   1. Build the module JAR via Gradle.
#   2. Sign the JAR with cosign keyless (GitHub OIDC → Fulcio cert → Rekor).
#   3. Publish JAR + signature + cert as workflow artifacts so the
#      controller's `POST /api/v1/modules/platform/upload` can consume them.
#
# Required repo settings on the contributor's fork:
#   - Actions enabled (default for new repos).
#   - No additional secrets needed — sigstore keyless flow uses the GitHub
#     OIDC token automatically. Add the cert's `subject` to your controller's
#     `modules.signing.trustRoots` so it accepts the signed JAR.

name: build + sign

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write     # OIDC token for cosign keyless signing

jobs:
  build:
    name: build + sign module JAR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Java 25 (preview)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build module JAR
        run: ./gradlew assemble --no-daemon

      - name: Locate built JAR
        id: jar
        run: |
          jar="$(ls build/libs/*.jar | grep -v -- '-sources\.jar$' | grep -v -- '-javadoc\.jar$' | head -n1)"
          if [[ -z "$jar" ]]; then
            echo "::error::no JAR found under build/libs/"
            exit 1
          fi
          echo "path=$jar" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$jar")" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Sign JAR (keyless, Rekor-logged)
        env:
          JAR: ${{ steps.jar.outputs.path }}
        run: |
          cosign sign-blob --yes \
            --bundle "${JAR}.cosign.bundle" \
            --output-certificate "${JAR}.pem" \
            --output-signature "${JAR}.sig" \
            "${JAR}"

      - name: Upload signed bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.jar.outputs.name }}.signed
          path: |
            ${{ steps.jar.outputs.path }}
            ${{ steps.jar.outputs.path }}.sig
            ${{ steps.jar.outputs.path }}.pem
            ${{ steps.jar.outputs.path }}.cosign.bundle
          if-no-files-found: error
          retention-days: 30

      - name: Print verification hint
        run: |
          echo "::notice::Add this cert subject to your controller's modules.signing.trustRoots:"
          echo "::notice::  $(cosign verify-blob --bundle ${{ steps.jar.outputs.path }}.cosign.bundle ${{ steps.jar.outputs.path }} 2>&1 | head -n5 || true)"
