manifestVersion: 1
id: example-playtime
version: 1.0.0-SNAPSHOT
hosts: [controller]
backend:
  controller:
    entrypoint: me.prexorjustin.prexorcloud.modules.example.platform.ExamplePlatformModule
frontend:
  sdkVersion: 1
  entry: index.js
storage:
  mongo: true
  limits:
    mongoDocuments: 100000
capabilities:
  provides:
    - id: example-playtime-query
      version: 1.0.0
extensions:
  - id: example-playtime-folia
    target: server/folia
    activation: explicit-group-attach
    variants:
      - id: example-playtime-folia
        mcVersionRange: "*"
        runtimeApiVersion: 1
        artifact: extensions/server/folia/example-playtime-folia.jar
        sha256: AUTO
        installPath: plugins/
  - id: example-playtime-paper
    target: server/paper
    activation: explicit-group-attach
    variants:
      - id: example-playtime-paper
        mcVersionRange: "*"
        runtimeApiVersion: 1
        artifact: extensions/server/paper/example-playtime-paper.jar
        sha256: AUTO
        installPath: plugins/
  - id: example-playtime-velocity
    target: proxy/velocity
    activation: explicit-group-attach
    variants:
      - id: example-playtime-velocity
        mcVersionRange: "*"
        runtimeApiVersion: 1
        artifact: extensions/proxy/velocity/example-playtime-velocity.jar
        sha256: AUTO
        installPath: plugins/
  - id: example-playtime-bedrock-geyser
    target: server/bedrock-geyser
    activation: explicit-group-attach
    variants:
      - id: example-playtime-bedrock-geyser
        mcVersionRange: "*"
        runtimeApiVersion: 1
        artifact: extensions/server/bedrock-geyser/example-playtime-bedrock-geyser.jar
        sha256: AUTO
        installPath: extensions/
