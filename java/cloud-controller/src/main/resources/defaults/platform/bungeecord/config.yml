listeners:
  - host: 0.0.0.0:%PORT%
    motd: "&bPrexorCloud Proxy"
    max_players: %MAX_PLAYERS%
    force_default_server: true
    tab_list: GLOBAL_PING
    query_enabled: false
    query_port: 25577
    proxy_protocol: false
    priorities:
      - lobby
online_mode: false
ip_forward: true
# BungeeCord refuses to start with an empty servers map ("No servers defined"),
# unlike Velocity. Ship a default placeholder backend (referenced by the listener
# priorities above) so the proxy boots; PrexorCloud's plugin registers and routes
# real backends dynamically at runtime.
servers:
  lobby:
    address: 127.0.0.1:25565
    motd: "&bPrexorCloud"
    restricted: false
permissions:
  default: []
  admin:
    - bungeecord.command.alert
    - bungeecord.command.end
    - bungeecord.command.ip
    - bungeecord.command.reload
connection_throttle: 4000
timeout: 30000
