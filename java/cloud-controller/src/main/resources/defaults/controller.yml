#    description: "Primary lobby + survival + creative network"
#    lobbyGroup: "lobby"
#    fallbackGroups:
#      - "survival"
#    memberGroups:
#      - "lobby"
#      - "survival"
#      - "creative"
#    proxyGroups:
#      - "proxy"
#    kickMessage: "All servers are temporarily unavailable. Please try again."
