name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Cancel superseded PR runs so quick consecutive pushes don't pile up runners.
# Push to main/master still runs to completion (cancel-in-progress only on PRs)
# so we never lose a green-on-trunk signal.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  contracts:
    name: Contract Drift Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-java-gradle
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: cli/go.sum
      - run: ./gradlew :cloud-protocol:test :cloud-daemon:test --tests me.prexorjustin.prexorcloud.protocol.contract.ProtoContractDriftTest --tests me.prexorjustin.prexorcloud.daemon.contract.StartupContractDriftTest
        working-directory: java
      - run: go test ./internal/setup -run TestStartupContractSnapshot
        working-directory: cli

  java:
    name: Java Build, Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-java-gradle
      # cloud-modules/stats-aggregator (and any module with a dashboard plugin)
      # invokes `pnpm install` from Gradle. The shared runner doesn't ship
      # Node + pnpm by default — set both up before the build.
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - run: ./gradlew spotlessCheck build
        working-directory: java
      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: java-test-reports
          path: |
            java/**/build/reports/tests/
            java/**/build/test-results/
          retention-days: 7
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: java-coverage
          path: java/*/build/reports/jacoco/
          retention-days: 14

  dashboard:
    name: Dashboard Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: dashboard
      # Hard gate (zero-dep, independent of the soft vitest below): en.json and
      # de.json must have the identical key set, so a string can't ship
      # translated in one locale and missing in the other.
      - name: i18n locale parity
        run: pnpm i18n:check
        working-directory: dashboard
      # Hardcoded-string guard — hard gate. The H.3 batches drove the inventory
      # to zero, so any new user-facing literal not routed through t() now fails
      # CI (keeps en/de coverage from regressing).
      - name: i18n hardcoded strings
        run: pnpm i18n:check-hardcoded
        working-directory: dashboard
      # Static a11y guard — hard gate. Every <img> needs an alt and every
      # icon-only control needs an accessible name (aria-label / sr-only). The
      # H.2 pass drove this to zero; regressions fail CI.
      - name: a11y lint
        run: pnpm a11y:check
        working-directory: dashboard
      # ESLint runs as a soft signal — pre-existing debt surfaces as a
      # GH Actions warning but does not fail the run. Track via v1.0.1.
      - name: Run pnpm lint (soft)
        run: pnpm lint || echo "::warning::eslint reported issues — see logs (non-fatal in v1.0)"
        working-directory: dashboard
      # Prettier check runs as a soft signal — dashboard hasn't had a full
      # normalize pass yet (571 source files). Hard gate once the tree is
      # uniformly formatted.
      - name: Run pnpm format:check (soft)
        run: pnpm format:check || echo "::warning::prettier reported formatting issues — run \`pnpm --filter dashboard format\` (non-fatal until dashboard normalize pass)"
        working-directory: dashboard
      # Voice / brand-guard lint — bans Title Case headings, emoji in product
      # UI strings, and "magical/blazing-fast/supercharged" filler.
      - name: Install ripgrep (required by lint-voice.sh)
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Voice + brand-guard lint
        run: ./scripts/lint-voice.sh
        working-directory: dashboard
      # Vitest is currently exiting non-zero on a known set of teardown
       # errors (echarts/ResizeObserver mocks). All 1112 assertions pass.
       # Soft signal for v1.0; tracked for v1.0.1 cleanup.
      - name: Run pnpm test:coverage (soft)
        run: pnpm test:coverage || echo "::warning::vitest teardown errors — see logs (non-fatal in v1.0, all assertions pass)"
        working-directory: dashboard
      # Built with VITE_DEV_MOCK=1 so the authed a11y scan below can drive the app
      # past login against the dev-mock backend. The flag is opt-in and never set
      # in release builds, so the mock tree-shakes out of production.
      - name: pnpm build (dev-mock baked in for the authed a11y scan)
        run: VITE_DEV_MOCK=1 pnpm build
        working-directory: dashboard
      # Runtime a11y scan (axe-core) — the complement to the hard static a11y
      # lint above: catches color-contrast and computed-role issues that need a
      # real browser, which the static scan can't see. Soft signal (the dashboard
      # is an authed SPA, so only the unauthed surface — login + root shell — is
      # scannable here; contrast isn't at zero yet). Mirrors the website axe job.
      - name: a11y runtime scan (axe-core, soft)
        continue-on-error: true
        working-directory: dashboard
        run: |
          pnpm preview &
          APP_PID=$!
          for _ in $(seq 1 30); do
            curl -sf http://127.0.0.1:3000/login > /dev/null && break
            sleep 1
          done
          # npx fetches the CLI to its own cache; do NOT `npm i` here — the
          # dashboard package.json has workspace:* deps that plain npm can't parse.
          npx --yes @axe-core/cli axe http://127.0.0.1:3000/login http://127.0.0.1:3000/ --exit || \
            echo "::warning::axe found runtime a11y issues on the login surface — see logs (soft until H.2 contrast pass)"
          kill $APP_PID 2>/dev/null || true
      # Authed-flow a11y scan (E-P1.1) — drives the app past login via the dev-mock
      # layer (build above) and runs axe-core in a real browser over the critical
      # authed routes. Soft until proven stable in CI; then it becomes the hard
      # E-P1.1 gate (0 serious/critical). See docs/engineering/track-e-plan.md.
      - name: a11y authed scan (axe-core via playwright, soft)
        continue-on-error: true
        working-directory: dashboard
        run: |
          pnpm preview &
          APP_PID=$!
          for _ in $(seq 1 30); do
            curl -sf http://127.0.0.1:3000/login > /dev/null && break
            sleep 1
          done
          # Install the browser-driver deps in an isolated dir: a plain `npm i`
          # inside dashboard/ chokes on its workspace:* deps, and ESM can't resolve
          # bare `playwright`/`@axe-core/playwright` imports via NODE_PATH. The scan
          # script has no local-file deps, so we run it from the install dir.
          AXE_DIR=$(mktemp -d)
          ( cd "$AXE_DIR" && npm init -y >/dev/null 2>&1 && npm i @axe-core/playwright playwright && npx playwright install --with-deps chromium )
          cp scripts/axe-authed.mjs "$AXE_DIR/"
          ( cd "$AXE_DIR" && BASE_URL=http://127.0.0.1:3000 node axe-authed.mjs ) || \
            echo "::warning::authed axe found serious/critical a11y issues — see logs (soft until E-P1.1 hardened)"
          kill $APP_PID 2>/dev/null || true
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-coverage
          path: dashboard/coverage/
          retention-days: 14

  installer:
    name: Installer Wizard A11y, Typecheck, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: installer/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: installer
      - run: pnpm format:check
        working-directory: installer
      # Hard a11y gate (Track E E-P2): the installer wizard is the first surface
      # an operator sees. Static lint for <img> alt + icon-only-control names,
      # mirroring the dashboard gate. Zero-dep.
      - run: pnpm a11y:check
        working-directory: installer
      - run: pnpm typecheck
        working-directory: installer
      - run: pnpm test
        working-directory: installer
      - run: pnpm build
        working-directory: installer

  design-system:
    name: Design-System Token Pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Zero dependencies on purpose — the generator is plain Node, no install.
      - name: Generate tokens
        run: node build-tokens.mjs
        working-directory: design-system
      - name: Assert dist/ is committed and fresh
        run: git diff --exit-code design-system/dist
      - name: Token parity tests (dist freshness + tokens.json ↔ colors_and_type.css)
        run: node --test
        working-directory: design-system

  cli:
    name: CLI Build, Test & GoReleaser Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: cli/go.sum
      - run: go vet ./...
        working-directory: cli
      - run: go test ./... -v -count=1 -coverprofile=coverage.out
        working-directory: cli
      - run: go build -o prexorctl .
        working-directory: cli
      # Validate .goreleaser.yaml syntax + features. Cheap to run alongside the
      # CLI build (same Go toolchain, same working dir) so it lives here rather
      # than as a separate job.
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: check
          workdir: cli
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: cli-coverage
          path: cli/coverage.out
          retention-days: 14

  drift-check:
    # Re-runs the auto-generators and fails if the working tree changes.
    # Surfaces stale CLI / proto reference docs as a clear CI error so
    # contributors don't merge "I forgot to run pnpm gen:cli".
    name: Drift Check (CLI + gRPC + Benchmarks + OpenAPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: cli/go.sum
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: ./.github/actions/setup-java-gradle

      # ── 1. CLI reference (docs/public/en/reference/cli/_generated/) ──
      - name: Build prexorctl
        run: make build
        working-directory: cli
      - name: Regenerate CLI docs
        run: node --experimental-strip-types tools/gen-cli-docs.ts
      - name: Fail if CLI docs drifted
        run: |
          if ! git diff --quiet -- docs/public/en/reference/cli/_generated/; then
            echo "::error::CLI reference is stale. Run \`pnpm --filter prexorcloud-website gen:cli\` and commit."
            git --no-pager diff --stat -- docs/public/en/reference/cli/_generated/
            exit 1
          fi

      # ── 2. gRPC reference (docs/public/en/internals/protocol/_generated/) ──
      # Cache the protoc-gen-doc binary across runs — `go install` + the apt
      # protobuf-compiler grab was ~30s on every PR.
      - name: Cache protoc-gen-doc
        id: cache-protoc-gen-doc
        uses: actions/cache@v4
        with:
          path: ~/go/bin/protoc-gen-doc
          key: protoc-gen-doc-v1.5.1-${{ runner.os }}
      - name: Install protoc-gen-doc
        if: steps.cache-protoc-gen-doc.outputs.cache-hit != 'true'
        run: go install github.com/pseudomuto/protoc-gen-doc/cmd/protoc-gen-doc@v1.5.1
      - name: Install protoc + expose protoc-gen-doc on PATH
        run: |
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Regenerate gRPC docs
        run: tools/gen-grpc-docs.sh
      - name: Fail if gRPC docs drifted
        run: |
          if ! git diff --quiet -- docs/public/en/internals/protocol/_generated/; then
            echo "::error::gRPC protocol reference is stale. Run \`pnpm --filter prexorcloud-website gen:grpc\` and commit."
            git --no-pager diff --stat -- docs/public/en/internals/protocol/_generated/
            exit 1
          fi

      # ── 3. Public benchmarks page (docs/public/en/benchmarks.md) ──
      - name: Regenerate benchmarks page
        run: node --experimental-strip-types tools/gen-benchmarks.ts
      - name: Fail if benchmarks page drifted
        run: |
          if ! git diff --quiet -- docs/public/en/benchmarks.md; then
            echo "::error::Benchmarks page is stale. Run \`pnpm --filter prexorcloud-website gen:bench\` and commit."
            git --no-pager diff -- docs/public/en/benchmarks.md
            exit 1
          fi

      # ── 4. Installer wizard embed (cli/internal/setupweb/static/index.html) ──
      # The embedded wizard is the singlefile output of installer/. Treat it
      # like the auto-generated reference docs above — fail the build if the
      # committed file drifted from a fresh `scripts/build-installer.sh` run.
      # Pinned-toolchain note: pnpm + node are set up here rather than reusing
      # the dashboard cache so this step is self-contained.
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: installer/pnpm-lock.yaml
      - name: Rebuild installer + check for drift
        run: |
          bash scripts/build-installer.sh
          if ! git diff --quiet -- cli/internal/setupweb/static/index.html; then
            echo "::error::Embedded wizard is stale. Run \`bash scripts/build-installer.sh\` from the repo root and commit cli/internal/setupweb/static/index.html."
            git --no-pager diff --stat -- cli/internal/setupweb/static/index.html
            exit 1
          fi

      # ── 5. OpenAPI spec freshness ──
      # The controller's javalin-openapi annotation processor regenerates the
      # spec on every compile and writes it to docs/openapi.json via the
      # `:cloud-controller:syncOpenApi` task (finalizedBy compileJava). Fail
      # the build if the committed docs/openapi.json drifted from the build
      # artefact — i.e. someone changed a route's @OpenApi without running
      # the sync.
      - name: OpenAPI spec freshness
        run: |
          (cd java && ./gradlew :cloud-controller:syncOpenApi -q)
          if ! git diff --quiet -- docs/openapi.json; then
            echo "::error::docs/openapi.json is stale. Run \`./gradlew :cloud-controller:syncOpenApi\` from java/ and commit."
            git --no-pager diff --stat -- docs/openapi.json
            exit 1
          fi
