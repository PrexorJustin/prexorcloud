name: website

on:
  push:
    branches: [main, master]
    paths:
      - 'website/**'
      - 'docs/public/**'
      - 'docs/openapi.json'
      - '.github/workflows/website.yml'
  pull_request:
    paths:
      - 'website/**'
      - 'docs/public/**'
      - 'docs/openapi.json'
      - '.github/workflows/website.yml'
  workflow_dispatch:

# Cancel superseded runs on the same ref so PR pushes don't queue multiple
# preview deploys.
concurrency:
  group: website-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # Required by the cloudflare/pages-action so Cloudflare Pages can post the
  # preview URL back as a deployment status.
  deployments: write
  pull-requests: write

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: install
        working-directory: website
        run: pnpm install --frozen-lockfile

      - name: typecheck
        working-directory: website
        run: pnpm check

      - name: check internal links
        working-directory: website
        run: pnpm check:links

      - name: build
        working-directory: website
        env:
          # When building for a Cloudflare Pages preview branch, Astro builds
          # static output that the deploy step picks up from `website/dist/`.
          NODE_ENV: production
        run: pnpm build

      - name: upload build
        uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: website/dist
          if-no-files-found: error
          retention-days: 7

  lighthouse:
    name: lighthouse + a11y
    needs: build
    runs-on: ubuntu-latest
    # Phase 11 launch-polish gate. Asserts the targets in WEBSITE_PLAN.md
    # §"Phase 11 — Pre-launch checklist": Lighthouse ≥ 95 on landing,
    # ≥ 90 on docs, plus axe-core a11y green.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: website-dist
          path: website/dist

      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      - name: serve dist on :4321
        working-directory: website
        run: |
          npx --yes http-server dist -p 4321 --silent &
          # http-server listens on IPv6 first by default; force a wait on the
          # IPv4 loopback that Lighthouse will actually hit.
          for _ in $(seq 1 30); do
            curl -sf http://127.0.0.1:4321/ > /dev/null && break
            sleep 1
          done

      # Soft signal for v1.0 — Lighthouse + axe reports run on every push so
       # regressions are visible, but failures don't block the workflow until
       # we hit the aspirational targets (perf >= 0.9, a11y == 1.0). Tracked
       # for v1.0.1.
      - name: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        continue-on-error: true
        with:
          urls: |
            http://127.0.0.1:4321/
            http://127.0.0.1:4321/getting-started/installation/
            http://127.0.0.1:4321/concepts/architecture/
            http://127.0.0.1:4321/reference/rest-api/operations/loginuser/
            http://127.0.0.1:4321/playground/
          configPath: website/.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: axe-core a11y scan
        working-directory: website
        continue-on-error: true
        run: |
          npm i --no-save @axe-core/cli
          npx axe \
            http://127.0.0.1:4321/ \
            http://127.0.0.1:4321/getting-started/installation/ \
            http://127.0.0.1:4321/concepts/architecture/ \
            http://127.0.0.1:4321/operations/production-checklist/ \
            --exit

  deploy:
    name: deploy (cloudflare pages)
    needs: build
    runs-on: ubuntu-latest
    # Run on every PR (preview) + every push to the default branch
    # (production). The action auto-detects which mode based on the branch.
    # Both `main` and `master` are accepted while the rename is in flight.
    if: github.event_name != 'workflow_dispatch' || contains(fromJSON('["refs/heads/main", "refs/heads/master"]'), github.ref)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: website-dist
          path: dist

      - name: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # `prexor-cloud-website` is the Cloudflare Pages project name; gets
          # created on first deploy via the dashboard.
          command: pages deploy dist --project-name=prexor-cloud-website --branch=${{ github.head_ref || github.ref_name }}

# REQUIRED REPO SECRETS:
#
#   CLOUDFLARE_API_TOKEN     — Token with the "Cloudflare Pages — Edit"
#                              permission scoped to the prexor-cloud-website
#                              project. Created in the CF dashboard under
#                              My Profile → API Tokens.
#   CLOUDFLARE_ACCOUNT_ID    — Account ID, visible in the CF dashboard
#                              right sidebar of any zone or worker.
#
# DOMAIN BINDING:
#
#   In the Cloudflare Pages project settings, attach `prexor.cloud` and
#   `www.prexor.cloud` as custom domains. The CNAME / apex record points at
#   <project>.pages.dev. Production deploys (push to main) become
#   prexor.cloud; preview deploys (PRs + non-main branches) become
#   <branch>.prexor-cloud-website.pages.dev.
