services:
  mongo:
    image: mongo:8
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  controller:
    build:
      context: ./java
      dockerfile: cloud-controller/Dockerfile
    ports:
      - "8080:8080"   # REST API
      - "9090:9090"   # gRPC
    volumes:
      - ./compose/controller.compose.yml:/app/config/controller.yml:ro
      - controller-data:/app/data
      - controller-templates:/app/templates
      - controller-certs:/app/certs
    depends_on:
      - mongo
    restart: unless-stopped

  daemon:
    build:
      context: ./java
      dockerfile: cloud-daemon/Dockerfile
    volumes:
      - daemon-instances:/app/instances
      - daemon-cache:/app/cache
      - daemon-certs:/app/certs
    environment:
      - PREXORCLOUD_CONTROLLER_HOST=controller
      - PREXORCLOUD_CONTROLLER_GRPC_PORT=9090
    depends_on:
      - controller
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
    ports:
      - "3000:3000"
    depends_on:
      - controller
    restart: unless-stopped

volumes:
  mongo-data:
  controller-data:
  controller-templates:
  controller-certs:
  daemon-instances:
  daemon-cache:
  daemon-certs:
