uuid: ""

http:
  host: "0.0.0.0"
  port: 8080
  cors:
    allowedOrigins:
      - "http://localhost:3000"

grpc:
  host: "0.0.0.0"
  port: 9090

network:
  allowedSubnets:
    - "0.0.0.0/0"
    - "::/0"

runtime:
  profile: "production"

database:
  uri: "mongodb://mongo:27017"
  database: "prexorcloud"

logging:
  level: "INFO"
  format: "HUMAN"

scheduler:
  evaluationIntervalSeconds: 15
  scalingCooldownSeconds: 60
  nodeTimeoutSeconds: 90

heartbeat:
  intervalMs: 30000
  missedThreshold: 3

security:
  jwtSecret: ""
  jwtExpirationMinutes: 1440
  initialAdminPassword: ""
  rateLimiting:
    perIpPerMinute: 100
    perUserPerMinute: 300

crashes:
  ringBufferSize: 500
  crashLoopThreshold: 3
  crashLoopWindowSeconds: 300

metrics:
  enabled: true
  retentionHours: 168
  collectionIntervalSeconds: 30

maintenance:
  enabled: false
  message: "The network is currently under maintenance."
  bypass: []

modules:
  directory: "modules"
  dataDirectory: "modules/data"
  hotReload: true

dashboard:
  enabled: true
  path: "dashboard"

